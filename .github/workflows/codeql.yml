# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '22 12 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: c-cpp
          build-mode: manual # MODIFICATO: Da autobuild a manual
        - language: python
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: ./custom-queries/10_taint_tracking.ql # Ottimo! Qui hai inserito correttamente la tua query.

    # MODIFICATO: Inseriti i veri comandi di build per U-Boot
    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bison flex libssl-dev bc
        
        # FIX: Diciamo al compilatore moderno di accettare il codice legacy
        export HOSTCFLAGS="-fcommon"
        export CFLAGS="-fcommon"
        
        make sandbox_defconfig
        make -j$(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
